<!DOCTYPE html>
<html>
<head>
    <title>Daily Investment News</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        a {
            text-decoration: none;
            color: #0077cc;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>

<h1>📰 Daily Investment News</h1>

<div id="news"></div>

<script>
fetch('news_data.json')
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById('news');

        data.forEach(article => {
            const div = document.createElement('div');
            div.className = 'card';

            div.innerHTML = `
                <h3><a href="${article.link}" target="_blank">${article.title}</a></h3>
                <p>${article.summary}</p>
            `;

            container.appendChild(div);
        });
    })
    .catch(err => {
        document.getElementById('news').innerHTML = "Error loading news.";
        console.error(err);
    });
</script>

</body>
</html>
